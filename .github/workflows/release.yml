name: Release Windows x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Disable updater artifacts (no signing key)
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content -Raw $configPath | ConvertFrom-Json
          $config.bundle.createUpdaterArtifacts = $false
          $config | ConvertTo-Json -Depth 32 | Set-Content -Path $configPath -Encoding UTF8
          Write-Host "Updater artifacts disabled."

      - name: Build the app
        run: npm run tauri build

      - name: Collect release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-files
          
          # NSIS installer (.exe) и MSI
          Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle" -Include "*.exe","*.msi" |
            Copy-Item -Destination release-files/
          
          Write-Host "Files to release:"
          Get-ChildItem release-files

      - name: Extract Release Notes
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          awk -v ver="$VERSION" '
            BEGIN { capture=0 }
            $0 ~ "^[[:space:]]*[*+-][[:space:]]+\\*\\*" ver { capture=1; next }
            capture && $0 ~ "^[[:space:]]*[*+-][[:space:]]+\\*\\*v" { capture=0; exit }
            capture { print }
          ' README.md | sed 's/^[[:space:]]\{8\}//' > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Windows x64 build for $VERSION" > release_notes.md
          fi

          cat release_notes.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "${{ github.ref_name }}"
          bodyFile: "release_notes.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-files/*"
          artifactErrorsFailBuild: false
          replacesArtifacts: true
          makeLatest: legacy
