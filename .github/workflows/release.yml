name: Release Windows x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            echo "Source: pushed tag"
          else
            TAG="v0.0.0-build-${{ github.run_number }}"
            echo "Source: workflow_dispatch, auto tag = $TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "Final tag: $TAG"

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Disable updater artifacts
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content -Raw $configPath | ConvertFrom-Json
          $config.bundle.createUpdaterArtifacts = $false
          $config | ConvertTo-Json -Depth 32 | Set-Content -Path $configPath -Encoding UTF8
          Write-Host "Updater artifacts disabled."

      - name: Build the app
        run: npm run tauri build

      - name: Collect release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-files
          Get-ChildItem -Recurse -Path "src-tauri/target/release/bundle" -File |
            Where-Object { $_.Extension -in @(".exe", ".msi") } |
            ForEach-Object {
              Write-Host "Copying: $($_.FullName)"
              Copy-Item $_.FullName -Destination release-files/
            }
          Write-Host "`n=== Files to upload ==="
          Get-ChildItem release-files

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ env.RELEASE_TAG }}
          path: release-files/*
          retention-days: 30

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ env.RELEASE_TAG }}
          name: "${{ env.RELEASE_TAG }}"
          body: "Windows x64 build ${{ env.RELEASE_TAG }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-files/*"
          artifactErrorsFailBuild: false
          replacesArtifacts: true
          makeLatest: legacy
